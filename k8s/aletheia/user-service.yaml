apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: manef99/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: SERVER_PORT
              value: "8080"

            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-user:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC"

            - name: SPRING_DATASOURCE_USERNAME
              value: "root"

            - name: SPRING_DATASOURCE_PASSWORD
              value: ""

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:8761/eureka"

            - name: EUREKA_INSTANCE_HOSTNAME
              value: "user-service"

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 8

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: aletheia
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080