# Namespace + Eureka (premier service Aletheia sur Kubernetes / kind + Docker Desktop)
# Docker Desktop ne déclare pas le cluster au CLI "kind" → utiliser le script (charge l'image dans le nœud) :
#   .\k8s\aletheia\load-eureka-image.ps1
# Puis: kubectl apply -f k8s/aletheia/eureka.yaml
# Puis: kubectl -n aletheia port-forward svc/eureka 8761:8761  → http://localhost:8761
apiVersion: v1
kind: Namespace
metadata:
  name: aletheia
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: aletheia
  labels:
    app.kubernetes.io/name: eureka
    app.kubernetes.io/part-of: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eureka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eureka
    spec:
      containers:
        - name: eureka
          image: aletheia-eureka:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8761
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: aletheia
  labels:
    app.kubernetes.io/name: eureka
    app.kubernetes.io/part-of: aletheia
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eureka
  ports:
    - name: http
      port: 8761
      targetPort: http
