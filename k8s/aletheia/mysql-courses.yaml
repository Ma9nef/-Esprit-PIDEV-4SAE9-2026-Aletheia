apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-courses
  namespace: aletheia
  labels:
    app.kubernetes.io/name: mysql-courses
    app.kubernetes.io/part-of: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql-courses
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql-courses
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ALLOW_EMPTY_PASSWORD
              value: "yes"
            - name: MYSQL_DATABASE
              value: course_management
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-courses
  namespace: aletheia
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mysql-courses
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql