apiVersion: apps/v1
kind: Deployment
metadata:
  name: library
  namespace: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: library
  template:
    metadata:
      labels:
        app: library
    spec:
      containers:
        - name: library
          image: manef99/library:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082

          env:
            - name: SERVER_PORT
              value: "8082"

            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:9999"

            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-library:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true"

            - name: SPRING_DATASOURCE_USERNAME
              value: "root"

            - name: SPRING_DATASOURCE_PASSWORD
              value: ""

            - name: APP_JWT_SECRET
              value: "CHANGE_ME_CHANGE_ME_CHANGE_ME_123456"

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:8761/eureka"

            - name: EUREKA_INSTANCE_HOSTNAME
              value: "library"

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"

            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8083"

          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 8

          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: library
  namespace: aletheia
spec:
  type: ClusterIP
  selector:
    app: library
  ports:
    - name: http
      port: 8082
      targetPort: 8082