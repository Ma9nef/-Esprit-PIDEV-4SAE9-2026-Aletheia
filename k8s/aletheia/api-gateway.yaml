apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: manef99/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089

          env:
            - name: SERVER_PORT
              value: "8089"

            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka:8761/eureka"

            - name: EUREKA_INSTANCE_HOSTNAME
              value: "api-gateway"

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"

          readinessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 8

          livenessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aletheia
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8089
      targetPort: 8089
      nodePort: 30089