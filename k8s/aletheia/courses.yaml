apiVersion: apps/v1
kind: Deployment
metadata:
  name: courses
  namespace: aletheia
  labels:
    app.kubernetes.io/name: courses
    app.kubernetes.io/part-of: aletheia
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: courses
  template:
    metadata:
      labels:
        app.kubernetes.io/name: courses
    spec:
      containers:
        - name: courses
          image: manef99/courses:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081

          resources:
            requests:
              memory: "512Mi"
              cpu: "150m"
            limits:
              memory: "768Mi"
              cpu: "700m"
---
apiVersion: v1
kind: Service
metadata:
  name: courses
  namespace: aletheia
  labels:
    app.kubernetes.io/name: courses
    app.kubernetes.io/part-of: aletheia
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: courses
  ports:
    - name: http
      port: 8081
      targetPort: http