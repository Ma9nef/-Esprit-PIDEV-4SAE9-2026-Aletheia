<p-toast />

<p-dialog
  [header]="isEdit ? '✏️ Edit Product' : '➕ New Product'"
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '640px', maxWidth: '95vw' }"
  styleClass="product-dialog"
  (onHide)="close()"
>

  <form [formGroup]="form" class="product-form">

    <!-- ── Section: Basic Info ─────────────────────────────────────────── -->
    <div class="form-section">
      <h4 class="section-title">Basic Information</h4>

      <!-- Title -->
      <div class="field">
        <label class="field-label" for="title">
          Title <span class="required">*</span>
        </label>
        <input
          id="title"
          pInputText
          formControlName="title"
          placeholder="e.g. The Great Gatsby"
          [class.ng-invalid]="isFieldInvalid('title')"
          [class.ng-dirty]="isFieldInvalid('title')"
          class="w-full"
        />
        <small class="field-error" *ngIf="isFieldInvalid('title')">
          {{ getError('title') }}
        </small>
      </div>

      <!-- Author -->
      <div class="field">
        <label class="field-label" for="author">Author</label>
        <input
          id="author"
          pInputText
          formControlName="author"
          placeholder="e.g. F. Scott Fitzgerald"
          class="w-full"
        />
      </div>

      <!-- Description -->
      <div class="field">
        <label class="field-label" for="description">Description</label>
        <textarea
          id="description"
          pTextarea
          formControlName="description"
          rows="3"
          placeholder="Short description of this product..."
          class="w-full"
          
        ></textarea>
      </div>
    </div>

    <p-divider />

    <!-- ── Section: Product Details ───────────────────────────────────── -->
    <div class="form-section">
      <h4 class="section-title">Product Details</h4>

      <div class="field-row">
        <!-- Type -->
        <div class="field flex-1">
          <label class="field-label">
            Type <span class="required">*</span>
          </label>
          <p-select
            [options]="typeOptions"
            formControlName="type"
            optionLabel="label"
            optionValue="value"
            class="w-full"
            styleClass="w-full"
          />
        </div>

        <!-- Price -->
        <div class="field flex-1">
          <label class="field-label">
            Price <span class="required">*</span>
          </label>
          <p-inputNumber
            formControlName="price"
            mode="currency"
            currency="USD"
            locale="en-US"
            [min]="0"
            [maxFractionDigits]="2"
            styleClass="w-full"
            [class.ng-invalid]="isFieldInvalid('price')"
          />
          <small class="field-error" *ngIf="isFieldInvalid('price')">
            {{ getError('price') }}
          </small>
        </div>
      </div>

      <!-- Available Toggle -->
      <div class="field available-field">
        <p-toggleswitch formControlName="available" inputId="available" />
        <label for="available" class="available-label">
          <span>Available for users</span>
          <span class="available-hint">
            {{ form.get('available')?.value ? 'Visible in the library catalog' : 'Hidden from users' }}
          </span>
        </label>
      </div>
    </div>

    <p-divider />

    <!-- ── Section: Cover Image ───────────────────────────────────────── -->
    <div class="form-section">
      <h4 class="section-title">Cover Image</h4>

      <div class="cover-upload-area">
        <!-- Preview -->
        <div class="cover-preview" [class.has-image]="coverPreviewUrl">
          <img *ngIf="coverPreviewUrl" [src]="coverPreviewUrl" alt="Cover preview" class="cover-preview__img" />
          <div *ngIf="!coverPreviewUrl" class="cover-preview__placeholder">
            <i class="pi pi-image"></i>
            <span>No cover</span>
          </div>
          <button *ngIf="coverPreviewUrl" type="button" class="cover-remove-btn" (click)="removeCover()" title="Remove cover">
            <i class="pi pi-times"></i>
          </button>
        </div>

        <!-- Upload Controls -->
        <div class="cover-controls">
          <p-fileUpload
            mode="basic"
            accept="image/*"
            [maxFileSize]="5000000"
            chooseLabel="Upload Image"
            chooseIcon="pi pi-upload"
            [auto]="true"
            (onSelect)="onCoverSelect($event)"
            styleClass="cover-upload-btn"
          />
          <p-progressBar *ngIf="uploadingCover" mode="indeterminate" styleClass="upload-progress" />
          <span class="upload-hint">PNG, JPG, WEBP — max 5MB</span>

          <p-divider align="center"><span class="divider-text">or paste URL</span></p-divider>

          <input
            pInputText
            formControlName="coverImageUrl"
            placeholder="https://example.com/cover.jpg"
            class="w-full"
            (input)="onCoverUrlChange(form.get('coverImageUrl')?.value)"
          />
        </div>
      </div>
    </div>

    <p-divider />

    <!-- ── Section: Product File ──────────────────────────────────────── -->
    <div class="form-section">
      <h4 class="section-title">Product File</h4>
      <p class="section-desc">Upload the actual file (PDF, EPUB, MP3, etc.) or link an external URL.</p>

      <div class="file-upload-area">
        <p-fileUpload
          mode="basic"
          accept=".pdf,.epub,.mp3,.mp4,.mobi"
          [maxFileSize]="50000000"
          chooseLabel="Upload File"
          chooseIcon="pi pi-file"
          [auto]="true"
          (onSelect)="onFileSelect($event)"
        />
        <p-progressBar *ngIf="uploadingFile" mode="indeterminate" styleClass="upload-progress" />
        <span class="upload-hint">PDF, EPUB, MP3, MP4, MOBI — max 50MB</span>
      </div>

      <div class="field mt-2">
        <label class="field-label">Or File URL</label>
        <input
          pInputText
          formControlName="fileUrl"
          placeholder="https://cdn.example.com/file.pdf"
          class="w-full"
        />
        <small class="field-hint" *ngIf="form.get('fileUrl')?.value">
          <i class="pi pi-check-circle" style="color: var(--green-500)"></i>
          File URL set
        </small>
      </div>
    </div>

  </form>

  <!-- ── Dialog Footer ────────────────────────────────────────────────── -->
  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        severity="secondary"
        [outlined]="true"
        (onClick)="close()"
        [disabled]="saving"
      />
      <p-button
        [label]="saving ? 'Saving…' : (isEdit ? 'Update Product' : 'Create Product')"
        [icon]="saving ? 'pi pi-spin pi-spinner' : 'pi pi-check'"
        (onClick)="submit()"
        [disabled]="saving || uploadingCover || uploadingFile"
        [loading]="saving"
      />
    </div>
  </ng-template>

</p-dialog>
