name: Core DevOps CI

on:
  push:
    branches:
      - test-devops
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-reactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile backend (aggregator + modules)
        working-directory: backend
        run: mvn -B -DskipTests compile

  backend-build:
    runs-on: ubuntu-latest
    needs:
      - backend-reactor
    strategy:
      matrix:
        service:
          - backend/ApiGateway
          - backend/config-server
          - backend/eureka
          - backend/microservices/user-service
          - backend/microservices/courses
          - backend/microservices/Library
          - backend/microservices/offer
          - backend/microservices/events
          - backend/microservices/ResourceManagement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build service
        working-directory: ${{ matrix.service }}
        run: mvn -B -DskipTests package

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            file: Dockerfile
          - name: api-gateway
            context: ./backend/ApiGateway
            file: Dockerfile
          - name: config-server
            context: ./backend/config-server
            file: Dockerfile
          - name: eureka
            context: ./backend/eureka
            file: Dockerfile
          - name: user-service
            context: ./backend/microservices/user-service
            file: Dockerfile
          - name: courses
            context: ./backend/microservices/courses
            file: Dockerfile
          - name: library
            context: ./backend/microservices/Library
            file: Dockerfile
          - name: offer
            context: ./backend
            file: microservices/offer/Dockerfile
          - name: events
            context: ./backend/microservices/events
            file: Dockerfile
          - name: resource-management
            context: ./backend/microservices/ResourceManagement
            file: Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.file }}
          push: false
          tags: aletheia/${{ matrix.name }}:ci
