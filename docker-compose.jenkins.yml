# ═══════════════════════════════════════════════════════════════════════════
#  DevOps Infrastructure  –  Jenkins + SonarQube
#  Usage:
#    docker compose -f docker-compose.jenkins.yml up -d
#
#  Ports:
#    Jenkins   →  http://localhost:8080
#    SonarQube →  http://localhost:9000  (admin / admin on first login)
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────────────────────
  jenkins:
  # ──────────────────────────────────────────────────────────────────────────
    image: jenkins/jenkins:lts-jdk17
    container_name: aletheia-jenkins
    restart: unless-stopped
    privileged: true
    user: root                          # needed to access Docker socket
    ports:
      - "8080:8080"                     # Jenkins Web UI
      - "50000:50000"                   # Jenkins agent (JNLP) port
    volumes:
      - jenkins-data:/var/jenkins_home  # persists jobs, credentials, configs
      - /var/run/docker.sock:/var/run/docker.sock  # DinD (Docker in Docker)
      - /usr/bin/docker:/usr/bin/docker            # reuse host Docker CLI
    environment:
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Xmx1024m
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  sonarqube:
  # ──────────────────────────────────────────────────────────────────────────
    image: sonarqube:10-community
    container_name: aletheia-sonarqube
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-extensions:/opt/sonarqube/extensions
      - sonar-logs:/opt/sonarqube/logs
    environment:
      SONAR_JDBC_URL:      jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"   # disable in dev/CI
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────────────────────────────────────
  sonar-db:
  # ──────────────────────────────────────────────────────────────────────────
    image: postgres:15-alpine
    container_name: aletheia-sonar-db
    restart: unless-stopped
    volumes:
      - sonar-pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       sonarqube
      POSTGRES_USER:     sonar
      POSTGRES_PASSWORD: sonar
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

# ─── Named volumes ────────────────────────────────────────────────────────
volumes:
  jenkins-data:
  sonar-data:
  sonar-extensions:
  sonar-logs:
  sonar-pg-data:

# ─── Network shared between DevOps tools ──────────────────────────────────
networks:
  devops-net:
    name: aletheia-devops-net
    driver: bridge
