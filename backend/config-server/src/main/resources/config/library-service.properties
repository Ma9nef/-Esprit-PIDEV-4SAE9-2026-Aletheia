############################
### SERVER
############################
server.port=${SERVER_PORT:8082}

############################
### DATABASE
############################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
### JPA / HIBERNATE
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

############################
### FILE UPLOAD
############################
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads

############################
### SECURITY / JWT
############################
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

############################
### NOTIFICATION SERVICE
############################
notification.internal-secret=${LIBRARY_INTERNAL_SECRET:LIBRARY_INTERNAL_SECRET_123}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8083}

############################
### EUREKA
############################
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
