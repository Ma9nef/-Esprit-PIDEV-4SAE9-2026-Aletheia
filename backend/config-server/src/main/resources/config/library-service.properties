############################
### SERVER
############################
server.port=8082
spring.application.name=library

spring.config.import=optional:configserver:http://config-server:8888

############################
### DATABASE
############################
spring.datasource.url=jdbc:mysql://mysql-library:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
### JPA / HIBERNATE
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

############################
### FILE UPLOAD
############################
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads

############################
### SECURITY / JWT
############################
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

############################
### NOTIFICATION SERVICE
############################
notification.internal-secret=LIBRARY_INTERNAL_SECRET_123
notification.service.url=http://notification-service:8083

############################
### EUREKA
############################
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.hostname=library
eureka.instance.prefer-ip-address=true