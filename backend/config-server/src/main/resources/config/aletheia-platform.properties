############################
### SERVER
############################
server.port=${SERVER_PORT:8080}
spring.application.name=aletheia-platform

############################
### DATABASE
############################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
### JPA / HIBERNATE
############################
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

############################
### JWT
############################
app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_123456
app.jwt.expiration-ms=86400000
############################
### LOGGING
############################
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

############################
### SWAGGER
############################
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
#upload image
app.upload.dir=uploads
#cloudinary
cloudinary.cloud-name=dqrtwfpbq
cloudinary.api-key=278878488189282
cloudinary.api-secret=${CLOUDINARY_API_SECRET:CHANGE_ME}



#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
