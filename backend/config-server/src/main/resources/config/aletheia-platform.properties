############################
### SERVER
############################
server.port=8080
spring.application.name=user-service

############################
### CONFIG SERVER
############################
spring.config.import=optional:configserver:http://config-server:8888

############################
### DATABASE
############################
spring.datasource.url=jdbc:mysql://mysql-user:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
### JPA / HIBERNATE
############################
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

############################
### JWT
############################
app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_123456
app.jwt.expiration-ms=86400000

############################
### LOGGING
############################
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

############################
### SWAGGER
############################
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

############################
### UPLOAD IMAGE
############################
app.upload.dir=uploads

############################
### CLOUDINARY
############################
cloudinary.cloud-name=dqrtwfpbq
cloudinary.api-key=278878488189282
cloudinary.api-secret=CHANGE_ME

############################
### EUREKA REGISTRY
############################
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
