server.port=8090


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/event_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# JWT
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

# Feign
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.compression.response.enabled=true
feign.compression.request.enabled=true

# Logging
logging.level.com.esprit.microservice.events=DEBUG
logging.level.org.springframework.web=INFO
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.org.springframework.cloud.openfeign=DEBUG

# WebSocket - pas de context-path (ligne supprim�e ou comment�e)
# server.servlet.context-path=  # Cette ligne est supprim�e
spring.web.resources.add-mappings=true