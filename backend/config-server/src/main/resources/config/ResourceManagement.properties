############################
### SERVER
############################
server.port=${SERVER_PORT:8094}

############################
### DATABASE
############################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aletheia_resources?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

############################
### JPA / HIBERNATE
############################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=always

############################
### EUREKA
############################
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true

############################
### KAFKA (optional)
############################
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
app.kafka.topic.reservation-events=${APP_KAFKA_TOPIC_RESERVATION_EVENTS:reservation-events}
app.kafka.enabled=${APP_KAFKA_ENABLED:false}

############################
### SECURITY / JWT
############################
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

############################
### OPENAPI / SWAGGER
############################
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

############################
### LOGGING
############################
logging.level.com.esprit.microservice.resourcemanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG
