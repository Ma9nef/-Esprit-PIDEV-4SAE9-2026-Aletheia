spring.application.name=library-service

server.port=8082
############################
spring.datasource.url=jdbc:mysql://localhost:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- File Upload Configuration ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=uploads



# Security / JWT
app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_123456

# Internal service-to-service secret (must match Notification service INTERNAL_SECRET)
notification.internal-secret=LIBRARY_INTERNAL_SECRET_123
# Direct URL — no Eureka needed for notification calls
notification.service.url=http://localhost:8083

#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
