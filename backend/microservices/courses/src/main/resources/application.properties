spring.application.name=courses-service

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:9999

# Fallback when config server is unavailable (same defaults as config/courses-service.properties)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/course_management?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port=${SERVER_PORT:8081}

# Fallback when config server is unavailable (matches config/courses-service.properties)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@localhost}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_123456
