spring.application.name=offer
spring.data.rest.detection-strategy=annotated
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:9999}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/offer_db}
spring.data.mongodb.auto-index-creation=true
server.port=${SERVER_PORT:8086}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=DEBUG
# Identique à user-service : export JWT_SECRET=... pour les deux JVM, sinon défaut partagé ci‑dessous
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=${STRIPE_CURRENCY:eur}

recommendation.ml.enabled=${RECOMMENDATION_ML_ENABLED:true}
recommendation.ml.python-command=${RECOMMENDATION_ML_PYTHON_COMMAND:python}
# Defauts locaux : depuis microservices/offer -> ../../ml/offer-recommendation/ ; Docker : RECOMMENDATION_ML_* dans docker-compose
recommendation.ml.script-path=${RECOMMENDATION_ML_SCRIPT_PATH:../../ml/offer-recommendation/predict_recommendation.py}
recommendation.ml.model-path=${RECOMMENDATION_ML_MODEL_PATH:../../ml/offer-recommendation/subscription_recommendation_model.joblib}

subscription.notifications.maintenance-cron=${SUBSCRIPTION_NOTIFICATIONS_MAINTENANCE_CRON:0 0 */6 * * *}

# Observabilite (Prometheus / Grafana) : /actuator/** en permitAll (SecurityConfig)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
