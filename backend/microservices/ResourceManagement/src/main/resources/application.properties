spring.application.name=ResourceManagement
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:9999}

server.port=${SERVER_PORT:8094}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aletheia_resources?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
app.kafka.topic.reservation-events=${APP_KAFKA_TOPIC_RESERVATION_EVENTS:reservation-events}
app.kafka.enabled=${APP_KAFKA_ENABLED:false}

app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.esprit.microservice.resourcemanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Observabilité (Prometheus / Grafana) — /actuator/** autorisé dans SecurityConfig
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true

# Server
server.port=8094

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resource_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (must match user-service secret)
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=*
app.kafka.enabled=true

# Reservation policies (global defaults)
app.reservation.default-expiry-hours=24
app.reservation.max-duration-hours=8
app.reservation.max-advance-booking-days=90
app.reservation.checkin-window-minutes=15
app.reservation.noshow-detection-minutes=30

# Swap request expiry
app.swap.expiry-hours=24

# Reputation score thresholds
app.reputation.trusted-threshold=80
app.reputation.auto-confirm-threshold=90

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Scheduler intervals (ms)
app.scheduler.noshow-check-ms=300000
app.scheduler.expiry-check-ms=600000
app.scheduler.swap-expiry-check-ms=1800000

# Logging
logging.level.com.esprit.microservice.resourcemanagement=INFO
logging.level.org.springframework.security=WARN
