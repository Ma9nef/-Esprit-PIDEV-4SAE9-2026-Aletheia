spring.application.name=ResourceManagement
spring.config.import=optional:configserver:http://localhost:9999

# Server
server.port=8094

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resource_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (must match user-service secret)
app.jwt.secret=${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=*
app.kafka.enabled=true

# Reservation policies (global defaults)
app.reservation.default-expiry-hours=24
app.reservation.max-duration-hours=8
app.reservation.max-advance-booking-days=90
app.reservation.checkin-window-minutes=15
app.reservation.noshow-detection-minutes=30

# Swap request expiry
app.swap.expiry-hours=24

# Reputation score thresholds
app.reputation.trusted-threshold=80
app.reputation.auto-confirm-threshold=90

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Scheduler intervals (ms)
app.scheduler.noshow-check-ms=300000
app.scheduler.expiry-check-ms=600000
app.scheduler.swap-expiry-check-ms=1800000

# Logging
logging.level.com.esprit.microservice.resourcemanagement=INFO
logging.level.org.springframework.security=WARN
