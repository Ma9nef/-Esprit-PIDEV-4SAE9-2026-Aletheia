# ===================================================================
# Resource Management Microservice Configuration
# ===================================================================

server.port=8086
spring.application.name=ResourceManagement

# ===================================================================
# MySQL DataSource (XAMPP)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/aletheia_resources?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================================================================
# Eureka Service Discovery
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ===================================================================
# Kafka (Optional Event-Driven)
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
app.kafka.topic.reservation-events=reservation-events
app.kafka.enabled=false

# ===================================================================
# Logging
# ===================================================================
logging.level.com.esprit.microservice.resourcemanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===================================================================
# Security / JWT
# ===================================================================
app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_123456

# ===================================================================
# OpenAPI
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
