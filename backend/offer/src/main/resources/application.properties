spring.application.name=offer
spring.data.mongodb.uri=mongodb://localhost:27017/offer_db
spring.data.mongodb.auto-index-creation=true
server.port=8086
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=DEBUG
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=${STRIPE_CURRENCY:eur}
recommendation.ml.enabled=${RECOMMENDATION_ML_ENABLED:true}
recommendation.ml.python-command=${RECOMMENDATION_ML_PYTHON_COMMAND:python}
recommendation.ml.script-path=${RECOMMENDATION_ML_SCRIPT_PATH:ml/predict_recommendation.py}
recommendation.ml.model-path=${RECOMMENDATION_ML_MODEL_PATH:ml/subscription_recommendation_model.joblib}