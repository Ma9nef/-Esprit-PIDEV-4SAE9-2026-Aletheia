services:

  # ════════════════════════════════════════════════════════════════════
  # DATABASES  (start first — all microservices depend on them)
  # ════════════════════════════════════════════════════════════════════

  mysql:
    image: mysql:8.0
    container_name: aletheia-mysql
    ports:
      - "3307:3306"           # 3307 on host → 3306 inside Docker (avoids conflict with XAMPP)
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alethia  # created automatically on first boot
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql  # creates all DBs
    networks:
      - aletheia-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10



  # ════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE  (Eureka → Config Server → Gateway)
  # ════════════════════════════════════════════════════════════════════

  eureka:
    build: ./eureka
    image: aletheia/eureka:latest
    container_name: aletheia-eureka
    ports:
      - "8761:8761"
    networks:
      - aletheia-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  config-server:
    build: ./config-server
    image: aletheia/config-server:latest
    container_name: aletheia-config-server
    ports:
      - "9999:9999"
    depends_on:
      eureka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
    networks:
      - aletheia-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./ApiGateway
    image: aletheia/api-gateway:latest
    container_name: aletheia-gateway
    ports:
      - "8089:8089"
    depends_on:
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      # Override localhost routes → use Docker service names
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://user-service:8080
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://courses:8081
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://library:8080
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://events:8090
      SPRING_CLOUD_GATEWAY_ROUTES_4_URI: http://offer:8086
      SPRING_CLOUD_GATEWAY_ROUTES_5_URI: http://resource-management:8094
    networks:
      - aletheia-net

  # ════════════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════════════════════════════════

  user-service:
    build: ./microservices/user-service
    image: aletheia/user-service:latest
    container_name: aletheia-user-service
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999
    networks:
      - aletheia-net

  library:
    build: ./microservices/Library
    image: aletheia/library:latest
    container_name: aletheia-library
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/library_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999
    networks:
      - aletheia-net



  resource-management:
    build: ./microservices/ResourceManagement
    image: aletheia/resource-management:latest
    container_name: aletheia-resource-management
    ports:
      - "8094:8094"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/resource_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      APP_KAFKA_ENABLED: "false"
    networks:
      - aletheia-net

  courses:
    build: ./microservices/courses
    image: aletheia/courses:latest
    container_name: aletheia-courses
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9999
    networks:
      - aletheia-net

# ════════════════════════════════════════════════════════════════════
# NETWORKS & VOLUMES
# ════════════════════════════════════════════════════════════════════

networks:
  aletheia-net:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
