      <a routerLink="manage-library" class="nav-item" routerLinkActive="nav-item--active" [routerLinkActiveOptions]="{exact:true}">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>

    </nav>
  </aside>


  <!-- MAIN CONTENT -->
  <main class="main-content">

    <header class="top-header">
      <div class="header-left">
        <h1 class="page-title">Admin Dashboard</h1>
      </div>
      <div class="header-right">
        <button type="button" class="icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge-dot" aria-hidden="true">5</span>
        </button>
        <div class="avatar-wrap" aria-hidden="true">
          <span class="avatar">AD</span>
        </div>
      </div>
    </header>

    <!-- ROUTER VIEW -->
    <router-outlet></router-outlet>


    <!-- DASHBOARD CONTENT -->
    <!-- visible only on /back-office/admin -->

    <section *ngIf="showDashboardWidgets" class="analytics-row">

      <div class="analytics-card">
        <span class="analytics-label">Total Revenue</span>
        <span class="analytics-value">$124,850</span>
        <span class="analytics-trend analytics-trend--up">+12.5% vs last month</span>
      </div>
      <div class="analytics-card">
        <span class="analytics-label">Active Users</span>
        <span class="analytics-value">8,432</span>
        <span class="analytics-trend analytics-trend--up">+8.2% vs last month</span>
      </div>
      <div class="analytics-card">
        <span class="analytics-label">Courses Published</span>
        <span class="analytics-value">156</span>
        <span class="analytics-trend analytics-trend--up">+3 new</span>
      </div>
      <div class="analytics-card">
        <span class="analytics-label">Certificates Issued</span>
        <span class="analytics-value">2,841</span>
        <span class="analytics-trend analytics-trend--up">+18% vs last month</span>
      </div>
    </section>


    <section *ngIf="showDashboardWidgets" class="stats-blocks">

      <div class="stats-block">
        <h2 class="stats-block-title">Users Statistics</h2>
          <li class="stats-list-item">
          </li>
          <li class="stats-list-item">
          </li>
          <li class="stats-list-item">

        </ul>
      </div>
      <div class="stats-block">
        <h2 class="stats-block-title">Courses Statistics</h2>
          <li class="stats-list-item">
          </li>
          <li class="stats-list-item">
          </li>
          <li class="stats-list-item">
          </li>
        </ul>
      </div>
    </section>
  </main>
