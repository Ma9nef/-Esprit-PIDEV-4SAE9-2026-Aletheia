<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditMode ? 'Edit' : 'Create' }} an Event</h2>

    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" placeholder="Event title">
        <div class="error" *ngIf="eventForm.get('title')?.invalid && eventForm.get('title')?.touched">
          Title required (min 3 characters)
        </div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" rows="4" placeholder="Description"></textarea>
        <div class="error" *ngIf="eventForm.get('description')?.invalid && eventForm.get('description')?.touched">
          Description required
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Start *</label>
          <input type="datetime-local" formControlName="startDate">
          <div class="error" *ngIf="eventForm.get('startDate')?.invalid && eventForm.get('startDate')?.touched">
            Start date required
          </div>
        </div>

        <div class="form-group">
          <label>End *</label>
          <input type="datetime-local" formControlName="endDate">
          <div class="error" *ngIf="eventForm.get('endDate')?.invalid && eventForm.get('endDate')?.touched">
            End date required
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" formControlName="location" placeholder="Location">
          <div class="error" *ngIf="eventForm.get('location')?.invalid && eventForm.get('location')?.touched">
            Location required
          </div>
        </div>

        <div class="form-group">
          <label>Organizer *</label>
          <input type="text" formControlName="organizer" placeholder="Organizer">
          <div class="error" *ngIf="eventForm.get('organizer')?.invalid && eventForm.get('organizer')?.touched">
            Organizer required
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Status *</label>
          <select formControlName="status">
            <option *ngFor="let status of statuses" [value]="status">
              {{ status }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Attendees</label>
          <input type="number" formControlName="expectedAttendees" placeholder="Number">
          <div class="error" *ngIf="eventForm.get('expectedAttendees')?.invalid && eventForm.get('expectedAttendees')?.touched">
            Positive number required
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ isEditMode ? 'Edit' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
