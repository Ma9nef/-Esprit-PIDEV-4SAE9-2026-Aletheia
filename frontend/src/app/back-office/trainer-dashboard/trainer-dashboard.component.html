<div class="aletheia-dashboard aletheia-trainer">
  <aside class="sidebar" aria-label="Trainer navigation">
    <div class="sidebar-brand">
      <span class="brand-text">ALETHEIA</span>
      <span class="brand-role">Trainer</span>
    </div>

    <nav class="sidebar-nav" aria-label="Trainer menu">
      <a
        routerLink="/back-office/trainer"
        routerLinkActive="nav-item--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Dashboard</span>
      </a>

      <a
        routerLink="/back-office/trainer/manage-courses"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span class="nav-label">Courses</span>
      </a>

      <a
        routerLink="/back-office/trainer/reservations"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        <span class="nav-label">My Reservations</span>
      </a>

      <a
        routerLink="/back-office/trainer/sessions"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="nav-label">My Sessions</span>
      </a>

      <a
        routerLink="/back-office/trainer/swaps"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </span>
        <span class="nav-label">My Swaps</span>
      </a>

      <a
        routerLink="/back-office/trainer/profile"
        routerLinkActive="nav-item--active"
        class="nav-item"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="nav-label">My Profile</span>
      </a>

      <button type="button" class="nav-item nav-item--disabled" disabled>
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="nav-label">Students</span>
      </button>

      <button type="button" class="nav-item nav-item--disabled" disabled>
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
        <span class="nav-label">Revenue</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <p class="sidebar-footer__title">Instructor Panel</p>
      <p class="sidebar-footer__text">Your workspace is ready for courses and reservations.</p>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
