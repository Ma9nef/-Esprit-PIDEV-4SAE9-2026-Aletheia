<div class="container-fluid mt-4">
  <div class="card shadow">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Manage Assessments</h5>
      <button class="btn btn-primary btn-sm" (click)="navigateToAdd()">+ Add New Assessment</button>
    </div>

    <!-- Extra Options Bar -->
    <div class="card-body border-bottom bg-light py-2">
      <div class="row align-items-center">
        <div class="col-md-3">
          <input type="text" class="form-control form-control-sm" placeholder="Search this table..." [(ngModel)]="searchTerm">
        </div>
        <div class="col-md-9 text-end">
         
        </div>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 40px;"><input type="checkbox"></th>
            <th>Actions</th>
            <th>total_score</th>
            <th>due_date</th>
           
            <th>title</th>
            <th>type</th>
            <th>course_id</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of assessments | filter:searchTerm">
            <td><input type="checkbox"></td>
            <td class="text-nowrap">
              <button class="btn btn-link btn-sm text-primary p-0 me-2" (click)="edit(a.id)">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn btn-link btn-sm text-dark p-0 me-2" (click)="copy(a)">
                <i class="bi bi-files"></i> Copy
              </button>
              <button class="btn btn-link btn-sm text-danger p-0" (click)="delete(a.id)">
                <i class="bi bi-dash-circle"></i> Delete
              </button>
            </td>
            <td>{{ a.totalScore }}</td>
            <td class="text-secondary small">{{ a.dueDate | date:'yyyy-MM-dd HH:mm:ss.SSSSSS' }}</td>
          
            <td class="fw-bold">{{ a.title }}</td>
            <td><span class="badge" [ngClass]="a.type === 'QUIZ' ? 'bg-info' : 'bg-warning'">{{ a.type }}</span></td>
            <td class="fst-italic text-muted">{{ a.course_id || 'NULL' }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-light py-2">
      <div class="d-flex align-items-center">
        <input type="checkbox" id="checkAll" class="me-2"> 
        <label for="checkAll" class="me-4 mb-0 small">Check all</label>
        <span class="small text-muted">With selected: </span>
        <button class="btn btn-link btn-sm text-dark">Edit</button>
        <button class="btn btn-link btn-sm text-dark">Copy</button>
        <button class="btn btn-link btn-sm text-danger">Delete</button>
      </div>
    </div>
  </div>
</div>
