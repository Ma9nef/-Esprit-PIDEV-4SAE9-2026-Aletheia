<div class="create-lesson-container">

  <div class="header">
    <h2>Create Lesson</h2>
    <button type="button" class="back-btn" (click)="cancel()">← Back to Builder</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="lesson-form" novalidate>

    <!-- TITLE -->
    <div class="form-group">
      <label>Lesson Title</label>
      <input
        type="text"
        formControlName="title"
        placeholder="e.g. Introduction to Spring Boot"
      />
      <small *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
        Title is required (max 160 characters).
      </small>
    </div>

    <!-- ORDER INDEX (REQUIRED) -->
    <div class="form-group">
      <label>Order Index</label>
      <input
        type="number"
        min="1"
        step="1"
        formControlName="orderIndex"
        placeholder="1"
      />
      <small *ngIf="form.get('orderIndex')?.touched && form.get('orderIndex')?.invalid">
        Order index is required and must be ≥ 1.
      </small>
    </div>

    <!-- TEXT CONTENT -->
    <div class="form-group">
      <label>Lesson Content (optional)</label>
      <textarea
        formControlName="contentText"
        rows="6"
        placeholder="Write the lesson explanation or instructions..."
      ></textarea>
    </div>

    <!-- YOUTUBE VIDEO -->
    <div class="form-group">
      <label>YouTube (ID or URL) (optional)</label>
      <input
        type="text"
        formControlName="youtubeVideoId"
        placeholder="ID: dQw4w9WgXcQ or URL: https://youtu.be/dQw4w9WgXcQ"
      />
      <small>
        You can paste a full YouTube link; it will be converted to an ID automatically.
      </small>
    </div>

    <!-- PDF REF (OPTIONAL) -->
    <div class="form-group">
      <label>PDF Reference (optional)</label>
      <input
        type="text"
        formControlName="pdfRef"
        placeholder="e.g. cloudinary public_id or direct PDF URL"
      />
      <small>
        Leave empty if this lesson has no PDF. (Max 255 characters)
      </small>
    </div>

    <!-- ERROR MESSAGE -->
    <div *ngIf="error" class="error">
      {{ error }}
    </div>

    <!-- SUCCESS MESSAGE -->
    <div *ngIf="success" class="success">
      {{ success }}
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
      <button type="submit" [disabled]="saving || form.invalid">
        {{ saving ? 'Creating...' : 'Create Lesson' }}
      </button>

      <button type="button" class="reset-btn" (click)="resetForm()" [disabled]="saving">
        Reset
      </button>
    </div>

  </form>

</div>
