<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h2 class="m-0">Edit Course</h2>
  
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary" (click)="cancel()" [disabled]="saving || uploadingImage">
          Back
        </button>
        <button class="btn btn-primary" (click)="submit()" [disabled]="saving || uploadingImage || loading">
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </div>
  
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <div *ngIf="loading" class="text-muted">Loading...</div>
  
    <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="row g-3">
      <div class="col-lg-7">
        <div class="card p-3">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input class="form-control" formControlName="title" />
          </div>
  
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="6" formControlName="description"></textarea>
          </div>
  
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Price</label>
              <input type="number" class="form-control" formControlName="price" min="0" step="0.5" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Duration (hours)</label>
              <input type="number" class="form-control" formControlName="durationHours" min="1" />
            </div>
          </div>
        </div>
      </div>
  
      <div class="col-lg-5">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="m-0">Course Image</h5>
            <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeImage()"
                    [disabled]="uploadingImage">
              Remove
            </button>
          </div>
  
          <div class="ratio ratio-16x9 rounded overflow-hidden bg-light mb-3">
            <img
              [src]="currentImageUrl || 'assets/images/course-placeholder.jpg'"
              alt="Course cover"
              (error)="onImageError($event)"
              style="object-fit: cover; width:100%; height:100%;"
            />
          </div>
  
          <input type="file" class="form-control" accept="image/*" (change)="onImageSelected($event)"
                 [disabled]="uploadingImage" />
  
          <div class="small text-muted mt-2" *ngIf="uploadingImage">
            Uploading image...
          </div>
  
          <div class="small text-muted mt-2">
            Saved URL:
            <div class="text-break">{{ form.get('imageUrl')?.value || '—' }}</div>
          </div>
        </div>
      </div>
  
      <button type="submit" class="d-none"></button>
    </form>
  </div>
