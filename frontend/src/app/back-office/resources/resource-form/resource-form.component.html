<div class="rf-container">

  <!-- Page header -->
  <div class="rf-header">
    <button class="rf-back-btn" (click)="cancel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to resources
    </button>
    <h1 class="rf-title">{{ isEdit ? 'Edit Resource' : 'New Resource' }}</h1>
  </div>

  <!-- Loader while fetching -->
  <div class="rf-loader" *ngIf="loading">
    <div class="rf-spinner"></div>
    <p>Loading resource…</p>
  </div>

  <!-- Error banner -->
  <div class="rf-alert-error" *ngIf="error">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>

  <!-- Form card -->
  <div class="rf-card" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <!-- Name -->
      <div class="rf-field">
        <label class="rf-label" for="name">Name <span class="rf-required">*</span></label>
        <input
          id="name"
          type="text"
          class="rf-input"
          [class.rf-input--error]="f['name'].invalid && f['name'].touched"
          formControlName="name"
          placeholder="e.g. Conference Room A">
        <span class="rf-field-error" *ngIf="f['name'].touched && f['name'].hasError('required')">Name is required.</span>
        <span class="rf-field-error" *ngIf="f['name'].touched && f['name'].hasError('minlength')">Minimum 2 characters.</span>
      </div>

      <!-- Type -->
      <div class="rf-field">
        <label class="rf-label" for="type">Type <span class="rf-required">*</span></label>
        <div class="rf-type-grid">
          <label
            *ngFor="let t of types"
            class="rf-type-option"
            [class.rf-type-option--active]="form.value.type === t">
            <input type="radio" formControlName="type" [value]="t" hidden>
            <span class="rf-type-icon">
              {{ t === 'ROOM' ? '🏫' : t === 'DEVICE' ? '💻' : '📦' }}
            </span>
            <span class="rf-type-label">{{ typeLabel(t) }}</span>
          </label>
        </div>
      </div>

      <!-- Capacity -->
      <div class="rf-field">
        <label class="rf-label" for="capacity">Capacity <span class="rf-hint">(optional)</span></label>
        <input
          id="capacity"
          type="number"
          class="rf-input rf-input--short"
          formControlName="capacity"
          placeholder="e.g. 30"
          min="1">
        <p class="rf-field-hint">Maximum number of people or units. Leave blank if not applicable.</p>
      </div>

      <!-- Metadata (JSON) -->
      <div class="rf-field">
        <label class="rf-label" for="metadata">Metadata <span class="rf-hint">(optional – JSON)</span></label>
        <textarea
          id="metadata"
          class="rf-textarea"
          [class.rf-input--error]="!!metadataError"
          formControlName="metadataRaw"
          rows="5"
          placeholder='{ "floor": 2, "hasProjector": true }'></textarea>
        <span class="rf-field-error" *ngIf="metadataError">{{ metadataError }}</span>
        <p class="rf-field-hint">Custom attributes stored as JSON. Must be valid JSON if provided.</p>
      </div>

      <!-- Actions -->
      <div class="rf-form-actions">
        <button type="button" class="rf-btn-ghost" (click)="cancel()">Cancel</button>
        <button type="submit" class="rf-btn-primary" [disabled]="saving">
          <span class="rf-spinner rf-spinner--sm" *ngIf="saving"></span>
          {{ saving ? 'Saving…' : (isEdit ? 'Update Resource' : 'Create Resource') }}
        </button>
      </div>

    </form>
  </div>

</div>
