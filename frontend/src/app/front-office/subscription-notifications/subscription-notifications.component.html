<section class="notifications-page">
  <div class="notifications-header">
    <div>
      <h1>Subscription Notifications</h1>
      <p>Track payment issues, renewals, plan changes, and upcoming expirations.</p>
    </div>
    <button type="button" class="mark-all-btn" (click)="markAllAsRead()">Mark all as read</button>
  </div>

  <div *ngIf="loading" class="state-message">Loading notifications...</div>
  <div *ngIf="error" class="state-message error">{{ error }}</div>
  <div *ngIf="!loading && !error && notifications.length === 0" class="state-message">
    No subscription notifications yet.
  </div>

  <article
    *ngFor="let notification of notifications"
    class="notification-card"
    [class.notification-card--unread]="!notification.read"
    (click)="markAsRead(notification)">
    <div class="notification-meta">
      <span class="notification-type">{{ notification.type }}</span>
      <span class="notification-date">{{ notification.createdAt | date:'medium' }}</span>
    </div>
    <h2>{{ notification.title }}</h2>
    <p>{{ notification.message }}</p>
  </article>
</section>
