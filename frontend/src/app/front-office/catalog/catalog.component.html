<div class="container py-4 courses-catalog">
    <h2 class="mb-4">Courses</h2>
  
    <div *ngIf="loading">Loading...</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  
    <div class="row" *ngIf="!loading && courses.length">
      <div class="col-md-4 mb-3" *ngFor="let c of courses">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">{{ c.title }}</h5>
            <p class="card-text">{{ c.description }}</p>
  
            <div class="small text-muted">
              Instructor: {{ c.instructorName }}<br />
              Duration: {{ c.durationHours }}h
            </div>
          </div>
  
          <div class="card-footer d-flex justify-content-between align-items-center">
            <strong>{{ c.price }} $</strong>
          
            <div class="d-flex gap-2 align-items-center">

              <button class="btn btn-outline-primary btn-sm" (click)="open(c.id)">
                View
              </button>
            
              <!-- Si déjà inscrit -->
              <span *ngIf="enrolledCourseIds.has(c.id)"
                    class="badge bg-success">
                ✓ Enrolled
              </span>
            
              <!-- Sinon afficher le bouton Enroll -->
              <button *ngIf="!enrolledCourseIds.has(c.id)"
                      class="btn btn-primary btn-sm"
                      [disabled]="enrollingId === c.id"
                      (click)="enroll(c.id)">
                {{ enrollingId === c.id ? 'Enrolling...' : 'Enroll' }}
              </button>
            
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <div *ngIf="!loading && !courses.length" class="alert alert-info">
      No courses found.
    </div>
  </div>
