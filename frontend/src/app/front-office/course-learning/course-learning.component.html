<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Start learning</h2>
    <button class="btn btn-outline-secondary btn-sm" (click)="backToCatalog()">Back</button>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div class="row">

    <!-- LEFT: LESSON LIST -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">

          <h5 class="mb-3">Lessons</h5>

          <div *ngIf="loadingList">
            Loading lessons...
          </div>

          <div *ngIf="!loadingList && lessons.length === 0" class="text-muted">
            No lessons available for this course.
          </div>

          <div class="list-group" *ngIf="!loadingList && lessons.length">

            <button
              type="button"
              class="list-group-item list-group-item-action"
              *ngFor="let l of lessons"
              [class.active]="selectedLesson?.id === l.id"
              (click)="openLesson(l.id)">

              {{ l.title }}

            </button>

          </div>

        </div>
      </div>
    </div>


    <!-- RIGHT: LESSON CONTENT -->
    <div class="col-md-8">
      <div class="card">
        <div class="card-body">

          <div *ngIf="loadingLesson">
            Opening lesson...
          </div>

          <ng-container *ngIf="!loadingLesson && selectedLesson">

            <h4>{{ selectedLesson?.title }}</h4>

            <div *ngIf="selectedLesson?.videoUrl" class="mb-3">
              <a
                [href]="selectedLesson?.videoUrl"
                target="_blank"
                rel="noopener">
                Open video
              </a>
            </div>

            <p *ngIf="selectedLesson?.content">
              {{ selectedLesson?.content }}
            </p>

            <p *ngIf="!selectedLesson?.content" class="text-muted">
              No content for this lesson.
            </p>

          </ng-container>

          <div *ngIf="!loadingLesson && !selectedLesson" class="text-muted">
            Select a lesson to start.
          </div>

        </div>
      </div>
    </div>

  </div>

</div>
