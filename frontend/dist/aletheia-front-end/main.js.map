<div class="container-fluid mt-4">
  <div class="card shadow-sm">
    <!-- HEADER -->
    <div class="card-header bg-light border-bottom d-flex justify-content-between align-items-center">
      <h6 class="mb-0 text-primary">
        <i class="bi bi-pencil-square"></i> 
        {{ isEditMode ? 'Edit' : 'Insert' }} {{ assessment.type }}
      </h6>
      <div>
        <button class="btn btn-sm btn-secondary me-2" (click)="cancel()">Cancel</button>
        <button class="btn btn-sm btn-primary" (click)="save()">Save Assessment</button>
      </div>
    </div>

    <div class="card-body bg-white">
      <!-- MAIN ASSESSMENT FIELDS (Always Visible) -->
      <div class="row g-3 mb-4 p-3 bg-light border rounded">
        
        <!-- 1. Title Input -->
        <div class="col-md-3">
          <label class="small fw-bold">Title</label>
          <input type="text" class="form-control form-control-sm" [(ngModel)]="assessment.title">
        </div>

   <!-- Update the OPTION line inside your select -->
<div class="col-md-3">
  <label class="small fw-bold">Course (Select by Description)</label>
  <select class="form-select form-select-sm" [(ngModel)]="assessment.course_id" name="course_id">
    <option [ngValue]="null">-- No Course Assigned --</option>
    
    <!-- USE [ngValue] HERE, NOT [value] -->
    <option *ngFor="let c of courses" [ngValue]="c.id">
      {{ c.title }} : {{ c.description | slice:0:40 }}...
    </option>
  </select>
</div>

        <!-- 3. Type -->
        <div class="col-md-2">
          <label class="small fw-bold">Type</label>
          <select class="form-select form-select-sm" [(ngModel)]="assessment.type">
            <option value="QUIZ">QUIZ</option>
            <option value="EXAM">EXAM</option>
          </select>
        </div>

        <!-- 4. Score -->
        <div class="col-md-2">
          <label class="small fw-bold">Total Score</label>
          <input type="number" class="form-control form-control-sm" [(ngModel)]="assessment.totalScore">
        </div>

        <!-- 5. Due Date -->
        <div class="col-md-2">
          <label class="small fw-bold">Due Date</label>
          <input type="datetime-local" class="form-control form-control-sm" [(ngModel)]="assessment.dueDate">
        </div>
      </div>

      <!-- VIEW 1: QUIZ GRID (Only shows if type is QUIZ) -->
      <div *ngIf="assessment.type === 'QUIZ'" class="table-responsive mt-4 animate-fade">
        <div class="d-flex justify-content-between bg-light p-2 border border-bottom-0">
          <span class="small fw-bold"><i class="bi bi-list-task"></i> Questions Grid (Table Mode)</span>
          <button class="btn btn-xxs btn-outline-success" (click)="addQuestion()">+ Add Row</button>
        </div>
        <table class="table table-sm table-bordered align-middle mb-0">
          <thead class="table-light small">
            <tr>
              <th style="width: 50px;">id</th>
              <th style="width: 100px;">points</th>
              <th>text</th>
              <th style="width: 100px;">Actions</th>
            </tr>
          </thead>
          <tbody class="small">
            <ng-container *ngFor="let q of assessment.questions; let i = index">
              <tr class="table-secondary-subtle">
                <td class="text-muted">{{ q.id || 'NEW' }}</td>
                <td><input type="number" class="form-control form-control-sm border-0 bg-transparent" [(ngModel)]="q.points"></td>
                <td><input type="text" class="form-control form-control-sm border-0 bg-transparent fw-bold" [(ngModel)]="q.text" placeholder="Enter question text..."></td>
                <td class="text-center">
                  <button class="btn btn-link btn-sm text-danger p-0" (click)="removeQuestion(i)">
                    <i class="bi bi-trash"></i> Delete
                  </button>
                </td>
              </tr>
              <tr>
                <td></td>
                <td colspan="3" class="p-0">
                  <table class="table table-sm table-borderless mb-0 ms-3 border-start">
                    <thead class="text-muted" style="font-size: 0.75rem;">
                      <tr>
                        <th style="width: 100px;">is_correct</th>
                        <th>option_text</th>
                        <th style="width: 50px;"><button class="btn btn-link btn-sm p-0" (click)="addOption(i)">+ Add Option</button></th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let opt of q.options; let j = index">
                        <td>
                          <div class="form-check form-switch ms-2">
                            <input class="form-check-input" type="checkbox" [name]="'correct_' + i + '_' + j" [(ngModel)]="opt.isCorrect">
                          </div>
                        </td>
                        <td>
                          <input type="text" class="form-control form-control-sm py-0 border-bottom" style="border:none; border-radius:0" [(ngModel)]="opt.optionText" placeholder="Option text...">
                        </td>
                        <td>
                          <button class="btn btn-link btn-sm text-danger p-0" (click)="removeOption(i, j)">×</button>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
            </ng-container>
          </tbody>
        </table>
      </div>

      <!-- VIEW 2: EXAM PAPER (Only shows if type is EXAM) -->
      <div *ngIf="assessment.type === 'EXAM'" class="mt-4 animate-fade">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="text-secondary"><i class="bi bi-file-earmark-text"></i> Formal Exam Paper Structure</h5>
          <button class="btn btn-primary btn-sm" (click)="addQuestion()">+ Add Exam Question</button>
        </div>

        <div class="exam-paper shadow-sm p-5 bg-white border rounded">
          <div *ngFor="let q of assessment.questions; let i = index" class="question-paper-block mb-5">
            <div class="d-flex justify-content-between align-items-baseline border-bottom pb-2 mb-3">
              <div class="flex-grow-1">
                <span class="fw-bold text-uppercase small text-muted">Question {{ i + 1 }}</span>
                <input type="text" class="form-control form-control-lg border-0 fw-bold p-0 shadow-none" 
                       [(ngModel)]="q.text" placeholder="Write the question prompt here...">
              </div>
              <div class="ms-3 text-end" style="width: 100px;">
                <label class="xxs-label">Score Weight</label>
                <input type="number" class="form-control form-control-sm text-center" [(ngModel)]="q.points">
                <button class="btn btn-link btn-sm text-danger p-0 mt-1" (click)="removeQuestion(i)">Remove</button>
              </div>
            </div>

            <!-- Exam Options List -->
            <div class="ms-4">
              <div *ngFor="let opt of q.options; let j = index" class="d-flex align-items-center mb-2">
                <div class="form-check me-3">
                    <input type="checkbox" class="form-check-input" [name]="'ex_check_' + i + '_' + j" [(ngModel)]="opt.isCorrect">
                </div>
                <input type="text" class="form-control form-control-sm border-0 border-bottom rounded-0 w-75" 
                       [(ngModel)]="opt.optionText" placeholder="Possible answer...">
                <button class="btn btn-link btn-sm text-muted p-0 ms-2" (click)="removeOption(i, j)">×</button>
              </div>
              <button class="btn btn-link btn-sm text-success p-0" (click)="addOption(i)">+ Add Choice</button>
            </div>
          </div>
          
          <div *ngIf="assessment.questions?.length === 0" class="text-center py-5 border border-dashed rounded">
             <p class="text-muted">No questions added to the exam paper yet.</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
