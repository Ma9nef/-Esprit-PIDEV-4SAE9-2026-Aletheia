# Scraping des métriques Spring Boot (Actuator + Micrometer Prometheus)
# Démarrer avec: docker compose up (services Aletheia sur le réseau aletheia-network)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: eureka
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka:8761"]
        labels:
          service: eureka
  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:9999"]
        labels:
          service: config-server
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8092"]
        labels:
          service: api-gateway
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8080"]
        labels:
          service: user-service
  - job_name: courses
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["courses:8081"]
        labels:
          service: courses
  - job_name: library
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["library:8082"]
        labels:
          service: library
  - job_name: offer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["offer:8086"]
        labels:
          service: offer
  - job_name: events
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["events:8090"]
        labels:
          service: events
  - job_name: resource-management
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["resource-management:8094"]
        labels:
          service: resource-management

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
