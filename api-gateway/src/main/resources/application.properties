spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://aletheia-platform
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=offer-service
spring.cloud.gateway.routes[1].uri=lb://offer
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/offers/**

spring.cloud.gateway.routes[2].id=flash-sales
spring.cloud.gateway.routes[2].uri=lb://offer
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/flash-sales/**

spring.cloud.gateway.routes[3].id=coupons
spring.cloud.gateway.routes[3].uri=lb://offer
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/coupons/**

spring.cloud.gateway.routes[4].id=analytics
spring.cloud.gateway.routes[4].uri=lb://offer
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/analytics/**

spring.cloud.gateway.routes[5].id=subscription-plans
spring.cloud.gateway.routes[5].uri=lb://offer
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/subscription-plans/**
