<div class="dashboard-container">
  <h2>Bienvenue dans Dashboard 🎉</h2>
  
  <div class="dashboard-cards">
    <!-- Carte Bibliothèque existante -->
    <div class="dashboard-card" (click)="goToRoom()">
      <div class="card-icon">📚</div>
      <div class="card-content">
        <h3>Bibliothèque</h3>
        <p>Entrer à la bibliothèque</p>
      </div>
    </div>

    <!-- Carte Événements -->
    <div class="dashboard-card" routerLink="/events">
      <div class="card-icon">📅</div>
      <div class="card-content">
        <h3>Gestion des Événements</h3>
        <p>Créer et gérer les événements</p>
      </div>
    </div>

    <!-- NOUVELLE CARTE ALLOCATIONS -->
    <div class="dashboard-card" routerLink="/allocations">
      <div class="card-icon">🔗</div>
      <div class="card-content">
        <h3>Gestion des Allocations</h3>
        <p>Allouer des ressources aux événements</p>
      </div>
    </div>
  </div>
</div>
