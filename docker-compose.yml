services:
  mysql:
    image: mysql:8.4
    container_name: aletheia-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aletheia-network

  eureka:
    build:
      context: ./backend/eureka
    container_name: aletheia-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - aletheia-network

  config-server:
    build:
      context: ./backend/config-server
    container_name: aletheia-config-server
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
    ports:
      - "9999:9999"
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - aletheia-network

  user-service:
    build:
      context: ./backend/microservices/user-service
    container_name: aletheia-user-service
    environment:
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: user-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-CHANGE_ME}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  courses:
    build:
      context: ./backend/microservices/courses
    container_name: aletheia-courses
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: courses
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/course_management?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  library:
    build:
      context: ./backend/microservices/Library
    container_name: aletheia-library
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: library
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      LIBRARY_INTERNAL_SECRET: ${LIBRARY_INTERNAL_SECRET:-LIBRARY_INTERNAL_SECRET_123}
      NOTIFICATION_SERVICE_URL: http://user-service:8080
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  api-gateway:
    build:
      context: ./backend/ApiGateway
    container_name: aletheia-api-gateway
    environment:
      SERVER_PORT: 8089
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      USER_SERVICE_URL: http://user-service:8080
      COURSES_SERVICE_URL: http://courses:8081
      LIBRARY_SERVICE_URL: http://library:8082
    ports:
      - "8089:8089"
    depends_on:
      eureka:
        condition: service_healthy
      user-service:
        condition: service_started
      courses:
        condition: service_started
      library:
        condition: service_started
    networks:
      - aletheia-network

  frontend:
    build:
      context: ./frontend
    container_name: aletheia-frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - aletheia-network

volumes:
  mysql_data:

networks:
  aletheia-network:
    driver: bridge
