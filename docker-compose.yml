services:
  mysql:
    image: mysql:8.4
    container_name: aletheia-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aletheia-network

  mongodb:
    image: mongo:7.0
    container_name: aletheia-mongodb
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE_OFFER:-offer_db}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "mongodb://localhost:27017/admin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - aletheia-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: aletheia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - aletheia-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aletheia-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - aletheia-network

  eureka:
    build:
      context: ./backend/eureka
    container_name: aletheia-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - aletheia-network

  config-server:
    build:
      context: ./backend/config-server
    container_name: aletheia-config-server
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
    ports:
      - "9999:9999"
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - aletheia-network

  user-service:
    build:
      context: ./backend/microservices/user-service
    container_name: aletheia-user-service
    environment:
      SERVER_PORT: 8080
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: user-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alethia?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-CHANGE_ME}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  courses:
    build:
      context: ./backend/microservices/courses
    container_name: aletheia-courses
    environment:
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: courses
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/course_management?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  library:
    build:
      context: ./backend/microservices/Library
    container_name: aletheia-library
    environment:
      SERVER_PORT: 8082
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: library
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aletheia_library?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      LIBRARY_INTERNAL_SECRET: ${LIBRARY_INTERNAL_SECRET:-LIBRARY_INTERNAL_SECRET_123}
      NOTIFICATION_SERVICE_URL: http://user-service:8080
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  offer:
    build:
      context: ./backend/microservices/offer
    container_name: aletheia-offer
    environment:
      SERVER_PORT: 8086
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: offer
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/${MONGO_DATABASE_OFFER:-offer_db}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
    ports:
      - "8086:8086"
    depends_on:
      mongodb:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  events:
    build:
      context: ./backend/microservices/events
    container_name: aletheia-events
    environment:
      SERVER_PORT: 8090
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: events
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE_EVENTS:-event_db}?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - aletheia-network

  resource-management:
    build:
      context: ./backend/microservices/ResourceManagement
    container_name: aletheia-resource-management
    environment:
      SERVER_PORT: 8094
      CONFIG_SERVER_URL: http://config-server:9999
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: resource-management
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE_RESOURCE_MANAGEMENT:-aletheia_resources}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      APP_KAFKA_ENABLED: ${APP_KAFKA_ENABLED:-true}
      APP_KAFKA_TOPIC_RESERVATION_EVENTS: ${APP_KAFKA_TOPIC_RESERVATION_EVENTS:-reservation-events}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
    ports:
      - "8094:8094"
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aletheia-network

  api-gateway:
    build:
      context: ./backend/ApiGateway
    container_name: aletheia-api-gateway
    environment:
      SERVER_PORT: 8089
      EUREKA_DEFAULT_ZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      USER_SERVICE_URL: http://user-service:8080
      COURSES_SERVICE_URL: http://courses:8081
      LIBRARY_SERVICE_URL: http://library:8082
      EVENTS_SERVICE_URL: http://events:8090
      OFFER_SERVICE_URL: http://offer:8086
      RESOURCE_MANAGEMENT_SERVICE_URL: http://resource-management:8094
    ports:
      - "8089:8089"
    depends_on:
      eureka:
        condition: service_healthy
      user-service:
        condition: service_started
      courses:
        condition: service_started
      library:
        condition: service_started
      offer:
        condition: service_started
      events:
        condition: service_started
      resource-management:
        condition: service_started
    networks:
      - aletheia-network

  frontend:
    build:
      context: ./frontend
    container_name: aletheia-frontend
    ports:
      - "4200:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - aletheia-network

volumes:
  mysql_data:
  mongo_data:
  zookeeper_data:
  kafka_data:

networks:
  aletheia-network:
    driver: bridge
