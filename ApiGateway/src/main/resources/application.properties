spring.application.name=ApiGateway
server.port=8089

# Eureka Registry (Added the trailing slash)
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Enable discovery-based routing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route 0 - Library Service
spring.cloud.gateway.routes[0].id=library-service
spring.cloud.gateway.routes[0].uri=lb://library-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/library/**

# Route 1 - Certificate Service
spring.cloud.gateway.routes[1].id=Certificate-service
spring.cloud.gateway.routes[1].uri=lb://Certificate-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/Certificate/**

# Route 2 - Aletheia Platform (ADDED THIS)
spring.cloud.gateway.routes[2].id=aletheia-platform
spring.cloud.gateway.routes[2].uri=lb://aletheia-platform
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/aletheia/**

# Note: Remove the globalcors properties if you are using CorsConfig.java
# to avoid "Duplicate Header" errors in the browser.
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true



